{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center mb-4">Enter Your Academic Data</h2>

        <form method="POST">
            <div class="mb-3">
                <label>Study Hours (per day)</label>
                <input type="number" step="0.1" name="study_hours" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Attendance (%)</label>
                <input type="number" step="0.1" name="attendance" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Sleep Hours</label>
                <input type="number" step="0.1" name="sleep_hours" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Internet Usage (hours)</label>
                <input type="number" step="0.1" name="internet_usage" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Analyze Performance
            </button>
        </form>
    </div>
</div>

{% endblock %}
