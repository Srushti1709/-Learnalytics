{% extends "base.html" %}
{% block content %}

<section class="nx-report-section">
<h2>🔐 Admin Login</h2>

<div class="nx-report-box">
<form method="POST">
    <input type="text" name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit" class="nx-download-btn">Login</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</div>

</section>
{% endblock %}
